# wf_config_drift — 天权配置漂移检测流水线 V2.0
# ================================================================
# 路由标签: config_drift | 通信: local_rpc | 域: tianquan

workflow_id: wf_config_drift
version: "2.0"
description: >
  天权配置漂移检测流水线 — 对比环境配置文件, 检测不一致/缺失/冗余项。
  三阶段: 配置收集 → 漂移分析 → 一致性报告
mode: strict
domain: tianquan
route_tag: config_drift
executor_type: local_rpc

constraints_schema:
  type: object
  required: [dna_root_id, location_fingerprint, spec_version, task, project_root]
  properties:
    dna_root_id: { type: string }
    location_fingerprint: { type: string }
    spec_version: { type: string, const: "TIANQUAN-SPEC-20260711" }
    task: { type: string }
    project_root: { type: string }
    baseline_env: { type: string, default: ".env.example" }

global_guard:
  guard_name: tianquan_config_preflight
  rules:
    - { name: project_root_valid, description: 项目根路径必须存在, priority: 0 }
    - { name: mh_no_cross_domain_issue, description: "MH-1", priority: 0 }
    - { name: mh_spec_constraints_required, description: "MH-2", priority: 0 }
    - { name: mh_no_llm_float_output, description: "MH-4", priority: 1 }
    - { name: mh_single_globaluid, description: "MH-5", priority: 1 }
    - { name: mh_no_local_persistence, description: "MH-7", priority: 2 }

phases:
  - phase_id: p1_collect
    parallel: false
    route_stamp_workshop: "TianquanRPC"
    route_stamp_operation: "CONFIG_COLLECT"
    nodes:
      - { node_id: n1_collect_configs, agent_type: tool, timeout_seconds: 60,
          prompt_template: "扫描项目配置文件: .env / .env.example / tsconfig.json / package.json / settings.json / pyproject.toml, 提取所有配置项。" }
      - { node_id: n2_normalize_keys, agent_type: tool, timeout_seconds: 30, depends_on: [n1_collect_configs],
          prompt_template: "键名归一化: 统一大小写/分隔符风格, 建立跨文件键名映射表。" }
    exit_guard:
      guard_name: p1_collect_gate
      rules:
        - { name: configs_found, description: 必须找到至少 1 个配置文件, priority: 1 }

  - phase_id: p2_analyze
    parallel: false
    route_stamp_workshop: "TianquanRPC"
    route_stamp_operation: "DRIFT_ANALYZE"
    nodes:
      - { node_id: n3_detect_drift, agent_type: tool, timeout_seconds: 60,
          prompt_template: "漂移检测: 对比 .env vs .env.example → 缺失/多余/值不一致项。" }
      - { node_id: n4_type_consistency, agent_type: tool, timeout_seconds: 30,
          prompt_template: "类型一致性检查: tsconfig.json compilerOptions vs 运行环境 / package.json engines vs Node版本。" }
    exit_guard:
      guard_name: p2_analyze_gate
      rules:
        - { name: drift_checked, description: 漂移检测必须完成, priority: 1 }

  - phase_id: p3_report
    parallel: false
    route_stamp_workshop: "TianquanRPC"
    route_stamp_operation: "CONFIG_REPORT"
    nodes:
      - { node_id: n5_generate_config_report, agent_type: tool, timeout_seconds: 60,
          prompt_template: "生成配置一致性报告: 文件清单/漂移项/安全敏感项/修复建议。" }
    exit_guard:
      guard_name: p3_report_gate
      rules:
        - { name: report_generated, description: 一致性报告必须生成, priority: 1 }

metadata:
  domain: tianquan
  route_tag: config_drift
  spec_version: "TIANQUAN-SPEC-20260711"
  communication: local_rpc
  harris_version: "2.0"
  allow_dynamic: false
  max_retry_per_node: 1
  total_timeout_seconds: 600
  master_harris:
    layer: DomainExecutorPool
    executor: LocalTianquanRPC
    snapshot_handler: SnapshotAggregator
    fault_handler: FaultMemoryArchiver
