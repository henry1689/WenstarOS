# wf_dependency_audit — 天权依赖审计流水线 V2.0
# ================================================================
# 适配: Harris-YAML V2.0 / Master-Harris V1.0 / DNA V2.0
# 路由标签: dep_audit | 通信: local_rpc | 域: tianquan

workflow_id: wf_dependency_audit
version: "2.0"
description: >
  天权依赖审计流水线 — Master-Harris 调度, 本地 RPC 执行。
  三阶段: 依赖树收集 → 安全审计(版本/漏洞/许可证) → 审计报告
mode: strict
domain: tianquan
route_tag: dep_audit
executor_type: local_rpc

constraints_schema:
  type: object
  required: [dna_root_id, location_fingerprint, spec_version, task, project_root]
  properties:
    dna_root_id: { type: string, pattern: "^\\d{6}\\d{14}M01[A-Z]{4}$" }
    location_fingerprint: { type: string }
    spec_version: { type: string, const: "TIANQUAN-SPEC-20260711" }
    task: { type: string }
    project_root: { type: string, description: "项目根路径" }
    check_licenses: { type: boolean, default: true }
    check_versions: { type: boolean, default: true }
    check_cycles: { type: boolean, default: true }

global_guard:
  guard_name: tianquan_depaudit_preflight
  rules:
    - { name: project_root_valid, description: 项目根路径必须存在, priority: 0 }
    - { name: has_package_file, description: 项目必须有 package.json 或 requirements.txt, priority: 1 }
    - { name: mh_no_cross_domain_issue, description: "MH-1 | 天权禁止主动向瑶灵/瑶光下发指令", priority: 0 }
    - { name: mh_spec_constraints_required, description: "MH-2 | 必须从全局 DNA 向量库读取域 SPEC", priority: 0 }
    - { name: mh_no_llm_float_output, description: "MH-4 | 工程任务不产生 32D 浮点值", priority: 1 }
    - { name: mh_single_globaluid, description: "MH-5 | 本次交互快照共用同一个 GlobalUID", priority: 1 }
    - { name: mh_no_local_persistence, description: "MH-7 | 审计结果统一交 M2 三库存储层", priority: 2 }

phases:
  - phase_id: p1_collect
    parallel: false
    route_stamp_workshop: "TianquanRPC"
    route_stamp_operation: "DEP_COLLECT"
    entry_guard:
      guard_name: p1_project_check
      rules:
        - { name: project_root_accessible, description: 项目根路径可访问, priority: 0 }
    nodes:
      - { node_id: n1_parse_dependencies, agent_type: tool, timeout_seconds: 120,
          prompt_template: "解析依赖清单: 读取 package.json/requirements.txt/pyproject.toml, 提取所有直接+传递依赖。" }
      - { node_id: n2_dependency_graph, agent_type: tool, timeout_seconds: 60, depends_on: [n1_parse_dependencies],
          prompt_template: "构建依赖图: 模块→依赖映射, 检测循环依赖, 计算依赖深度。" }
    exit_guard:
      guard_name: p1_collect_gate
      rules:
        - { name: dependencies_found, description: 必须发现至少 1 个依赖, priority: 1 }

  - phase_id: p2_audit
    parallel: false
    route_stamp_workshop: "TianquanRPC"
    route_stamp_operation: "DEP_AUDIT"
    nodes:
      - { node_id: n3_version_audit, agent_type: tool, timeout_seconds: 60,
          prompt_template: "版本审计: 检测过时依赖 (major/minor/patch 版本落后), 标记安全漏洞版本范围。" }
      - { node_id: n4_license_audit, agent_type: tool, timeout_seconds: 30,
          prompt_template: "许可证审计: 解析 package 许可证字段, 标记 GPL/AGPL/未声明 等风险许可证。" }
      - { node_id: n5_unused_dep_audit, agent_type: tool, timeout_seconds: 30,
          prompt_template: "未使用依赖检测: 对比 import 语句与 package.json dependencies, 找可能未使用的包。" }
    exit_guard:
      guard_name: p2_audit_gate
      rules:
        - { name: audit_complete, description: 版本+许可证+未使用 三项审计必须全部完成, priority: 1 }

  - phase_id: p3_report
    parallel: false
    route_stamp_workshop: "TianquanRPC"
    route_stamp_operation: "DEP_REPORT"
    nodes:
      - { node_id: n6_generate_dep_report, agent_type: tool, timeout_seconds: 60,
          prompt_template: "生成依赖审计报告: 总依赖数/过时数/风险许可证/未使用/循环数 + 修复建议。" }
    exit_guard:
      guard_name: p3_report_gate
      rules:
        - { name: report_generated, description: 审计报告必须生成, priority: 1 }

metadata:
  domain: tianquan
  route_tag: dep_audit
  spec_version: "TIANQUAN-SPEC-20260711"
  communication: local_rpc
  harris_version: "2.0"
  allow_dynamic: false
  max_retry_per_node: 1
  total_timeout_seconds: 600
  master_harris:
    layer: DomainExecutorPool
    executor: LocalTianquanRPC
    snapshot_handler: SnapshotAggregator
    fault_handler: FaultMemoryArchiver
